<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Redirecting...</title>

<meta name="robots"
content="noindex">

</head>

<body>

<p style="font-family:Arial;text-align:center;margin-top:50px;">

Redirecting...

</p>

<script>
    const path = location.pathname;

if(path.startsWith("/post/")){

    const file = path.split("/").pop().replace(".html","");

    const id = file.split("--")[1];

    location.replace("/post.html?id="+id);

}

else if(path.startsWith("/grouppost/")){

    const file = path.split("/").pop().replace(".html","");

    const id = file.split("--")[1];

    location.replace("/group-post.html?id="+id);

}

else{

    location.replace("/");

}
</script>
</body>

</html>
