<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Redirecting...</title>

<meta name="robots"
content="noindex">

</head>

<body>

<p style="font-family:Arial;text-align:center;margin-top:50px;">

Redirecting...

</p>

<script>

(function(){

const path = window.location.pathname;

// Only handle SEO post URLs
if(!path.startsWith("/post/")){

    location.replace("/");

    return;

}

const filename = path
    .split("/")
    .pop()
    .replace(".html","");

// Split using "--"
const parts = filename.split("--");

if(parts.length !== 2){

    location.replace("/");

    return;

}

const id = parts[1];

location.replace(

"/post.html?id=" + encodeURIComponent(id)

);

})();

</script>
</body>

</html>
