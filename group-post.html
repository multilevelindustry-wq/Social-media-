<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Group Post</title>

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9884706884825746"
     crossorigin="anonymous"></script>

  <meta name="google-adsense-account" content="ca-pub-9884706884825746">
  
<!-- Browser address bar color -->
  <meta name="theme-color" content="#ffffff">

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- App icons -->
  <link rel="icon" href="favicon.png">
  <link rel="apple-touch-icon" href="Icon-192.png">

  <!-- Register Service Worker -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js")
          .then(() => console.log("Service Worker Registered"))
          .catch(err => console.error("Service Worker Error:", err));
      });
    }
  </script>
  
<link rel="stylesheet" href="group-post.css">

</head>

<body>

<!-- Loading -->
<div id="loadingOverlay" class="loading">
Loading...
</div>

<!-- Header -->
<header class="postHeader">

<button id="backBtn">
←
</button>

<h2>
Group Post
</h2>

<button id="postMenu">
⋮
</button>

</header>

<!-- Post -->
<div id="postContainer"></div>

<!-- Comments -->

<div class="commentsSection">

<h3>
Comments
</h3>

<div id="commentsList"></div>

</div>

<!-- Comment Box -->

<div class="commentInput">

<img
id="commentAvatar"
src="assets/default-avatar.png">

<input
id="commentText"
placeholder="Write a comment...">

<button
id="sendComment">

Send

</button>

</div>

<script
type="module"
src="group-post.js">
</script>

<script src="service.js"></script>
  
</body>
</html>
