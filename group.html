<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Group</title>

<link rel="stylesheet" href="variable.css">
<link rel="stylesheet" href="app.css">
<link rel="stylesheet" href="group.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header class="topbar">

<a href="groups.html">

← Groups

</a>

<h2>

CreatorHub

</h2>

<img

id="userAvatar"

src="assets/default-avatar.png"

class="topAvatar">

</header>

<main class="groupPage">
    
    <section class="groupHeader">

<img

id="groupCover"

class="groupCover"

src="assets/default-cover.jpg">

<div class="groupInfo">

<h1 id="groupName">

Loading...

</h1>

<p id="groupDescription">

</p>

<div class="groupStats">

<span id="memberCount">

0 Members

</span>

<span id="postCount">

0 Posts

</span>

<span id="privacyType">

Public

</span>

</div>

<div class="groupButtons">

<button id="joinBtn">

Join Group

</button>

<button id="inviteBtn">

Invite Friends

</button>

</div>

</div>

</section>

<section class="createGroupPost">

<h2>

Create Group Post

</h2>

<form id="groupPostForm">

<input

type="text"

id="postTitle"

placeholder="Title"

required>

<textarea

id="postDescription"

placeholder="Write something..."

required>

</textarea>

<input

type="file"

id="postMedia"

accept="image/*,video/*">

<button type="submit">

Post

</button>

</form>

</section>

<section class="groupFeed">

<h2>

Group Feed

</h2>

<div

id="groupPosts">

<!-- Posts appear here -->

</div>

</section>

<aside class="membersSidebar">

<h2>

Members

</h2>

<div

id="membersList">

<!-- Members -->

</div>

</aside>

</main>

<script

type="module"

src="group.js">

</script>

</body>

</html>
