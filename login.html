<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Login | CreatorHub</title>

<link rel="stylesheet"
href="style.css">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

  <link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#ff3b30">

<link rel="apple-touch-icon" href="icons/icon-192.png">
  
</head>

<body>

<div class="login-container">

<div class="login-card">

<div class="logo">

<h1>CreatorHub</h1>

<p>Welcome Back</p>

</div>

<form id="loginForm">

<div class="inputBox">

<label>Email</label>

<input
type="email"
id="email"
placeholder="Enter Email"
required>

</div>

<div class="inputBox">

<label>Password</label>

<input
type="password"
id="password"
placeholder="Enter Password"
required>

</div>

<div class="remember">

<label>

<input
type="checkbox"
id="remember">

Remember Me

</label>

</div>

<button
type="submit"
class="loginButton">

Login

</button>

<p class="signupLink">

Don't have an account?

<a href="signup.html">

Create One

</a>

</p>

</form>

</div>

</div>

<script type="module"
src="login.js"></script>
<script
type="module"
src="social.js">
</script>

  <script
type="module"
src="service.js">
  </script>
  

</body>

</html>
