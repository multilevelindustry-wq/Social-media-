<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>View Post</title>

<link rel="stylesheet"
href="variable.css">

<link rel="stylesheet"
href="app.css">

<link rel="stylesheet"
href="post.css">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

    <link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#ff3b30">

<link rel="apple-touch-icon" href="icons/icon-192.png">
    
</head>

<body>

<header class="topbar">

<a href="index.html">

← Home

</a>

<h2>

CreatorHub

</h2>

<img

id="userAvatar"

src="assets/default-avatar.png"

class="topAvatar">

</header>

<main class="postPage">
    
    <div class="singlePost"

id="singlePost">

<!-- Post loads here -->

</div>

<section class="commentsSection">

    <h2>Comments</h2>

    <form id="commentForm">

        <textarea
            id="commentText"
            placeholder="Write a comment..."
            required>
        </textarea>

        <button type="submit" id="commentSubmitBtn">
            Post Comment
        </button>

    </form>

    <div id="commentsContainer">
        <!-- Comments -->
    </div>

</section>


<section class="relatedPosts">

<h2>

Related Posts

</h2>

<div

id="relatedPosts">

</div>

</section>

</main>

<script
type="module"
src="post.js">
</script>

    <script
type="module"
src="service.js">
    </script>
    
</body>

</html>
