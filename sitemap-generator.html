<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>CreatorHub Sitemap Generator</title>

<style>

body{

font-family:Arial,sans-serif;

max-width:1200px;

margin:30px auto;

padding:20px;

background:#f5f5f5;

}

h1{

margin-bottom:10px;

}

button{

padding:14px 24px;

background:#1877f2;

color:#fff;

border:none;

border-radius:8px;

cursor:pointer;

margin-right:10px;

margin-bottom:20px;

}

textarea{

width:100%;

height:600px;

font-family:monospace;

padding:15px;

border-radius:8px;

}

.status{

background:#fff;

padding:15px;

border-radius:8px;

margin-bottom:20px;

}

</style>

</head>

<body>

<h1>

CreatorHub Sitemap Generator

</h1>

<div
class="status"
id="status">

Ready

</div>

<button
id="generateBtn">

Generate Sitemap

</button>

<button
id="copyBtn">

Copy Sitemap

</button>

<textarea
id="output">

</textarea>

<script
type="module"
src="sitemap-generator.js">

</script>

</body>

</html>
